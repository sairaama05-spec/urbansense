name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest – Python 3.11 (CPU)
    runs-on: ubuntu-latest

    steps:
      # ── checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── install CPU-only PyTorch first (avoids pulling 2 GB CUDA wheels) ─────
      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu

      # ── install project requirements (skip GPU-specific packages) ─────────────
      - name: Install project requirements
        run: |
          # lapx provides prebuilt linear-assignment wheels (bytetracker dep)
          pip install lapx

          # Strip GPU-only / already-installed packages
          grep -vE "^(onnxruntime-gpu|torch==|torchvision==|#|$)" requirements.txt \
            > requirements-ci.txt
          pip install -r requirements-ci.txt

          # CPU ONNX runtime (replaces onnxruntime-gpu stripped above)
          pip install onnxruntime

          # transformers: best-effort — tests mock it if install fails
          pip install "transformers>=4.30,<6" || echo "transformers unavailable, tests will use mock"

          # bytetracker: best-effort — tests mock it if install fails
          pip install bytetracker || echo "bytetracker unavailable, tests will use mock"

          pip install pytest pytest-cov

      # ── run test suite ────────────────────────────────────────────────────────
      - name: Run pytest
        run: PYTHONPATH=. pytest tests/ -v --tb=short

      # ── upload coverage (optional, non-blocking) ──────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
